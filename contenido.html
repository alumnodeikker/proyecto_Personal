<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contenido | Despacho Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 text-gray-900 antialiased">
  <main class="mx-auto w-full max-w-6xl px-5 py-6 md:py-8">
    <header class="mb-6 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-gray-200 bg-white px-5 py-4 shadow-sm">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.14em] text-gray-500">Gestor de contenido</p>
        <h1 class="text-2xl font-bold tracking-tight md:text-3xl">Banco, preview y agenda</h1>
      </div>
      <a href="dashboard.html" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-100">Volver al dashboard</a>
    </header>

    <div class="flex flex-wrap gap-6">
      <section class="w-full rounded-2xl border border-gray-200 bg-white p-5 shadow-sm xl:flex-[2_1_0%]">
        <div class="flex items-center justify-between gap-2">
          <h2 class="text-lg font-semibold tracking-tight">Nuevo contenido programable</h2>
          <span class="rounded-full bg-gray-100 px-3 py-1 text-xs font-semibold text-gray-600">Simulacion</span>
        </div>

        <form id="formContenido" class="mt-4 space-y-4">
          <div>
            <label for="titulo" class="mb-1 block text-sm font-semibold text-gray-700">Titulo</label>
            <input id="titulo" type="text" required placeholder="Ej. 3 habitos para comenzar mejor el dia" class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-gray-500" />
          </div>

          <div>
            <label for="descripcion" class="mb-1 block text-sm font-semibold text-gray-700">Descripcion</label>
            <textarea id="descripcion" rows="3" required placeholder="Escribe el mensaje principal que quieres publicar." class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-gray-500"></textarea>
          </div>

          <div>
            <p class="mb-2 text-sm font-semibold text-gray-700">Banco de imagenes</p>
            <div id="bancoImagenes" class="flex flex-wrap gap-3"></div>
          </div>

          <div class="flex flex-wrap gap-3">
            <div class="w-full sm:w-[calc(50%-0.375rem)]">
              <label for="fecha" class="mb-1 block text-sm font-semibold text-gray-700">Fecha y hora de publicacion</label>
              <input id="fecha" type="datetime-local" required class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-gray-500" />
            </div>
            <div class="flex w-full items-end gap-2 sm:w-[calc(50%-0.375rem)]">
              <button type="submit" class="w-full rounded-lg bg-gray-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-gray-700">Guardar y agendar</button>
            </div>
          </div>

          <p id="estado" class="text-sm font-medium"></p>
        </form>
      </section>

      <section class="w-full space-y-6 xl:flex-[1_1_0%]">
        <article class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
          <h2 class="text-base font-semibold text-gray-900">Preview de publicacion</h2>
          <div id="previewPost" class="mt-3 rounded-xl border border-gray-200 bg-gray-50 p-3">
            <img id="previewImagen" src="https://images.unsplash.com/photo-1489533119213-66a5cd877091?auto=format&fit=crop&w=900&q=80" alt="Preview" class="h-40 w-full rounded-lg object-cover" />
            <h3 id="previewTitulo" class="mt-3 text-lg font-semibold tracking-tight text-gray-900">Titulo de ejemplo</h3>
            <p id="previewDescripcion" class="mt-1 text-sm text-gray-600">Aqui veras como quedaria el contenido antes de publicarlo.</p>
          </div>
        </article>

        <article class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold text-gray-900">Publicaciones agendadas</h2>
            <span id="totalAgendadas" class="rounded-full bg-gray-100 px-2 py-0.5 text-xs font-semibold text-gray-600">0</span>
          </div>
          <div id="listaAgendadas" class="mt-3 space-y-2"></div>
        </article>
      </section>
    </div>
  </main>

  <script>
    const bancoImagenes = document.getElementById('bancoImagenes');
    const formContenido = document.getElementById('formContenido');
    const estado = document.getElementById('estado');
    const listaAgendadas = document.getElementById('listaAgendadas');
    const totalAgendadas = document.getElementById('totalAgendadas');
    const previewTitulo = document.getElementById('previewTitulo');
    const previewDescripcion = document.getElementById('previewDescripcion');
    const previewImagen = document.getElementById('previewImagen');
    const inputTitulo = document.getElementById('titulo');
    const inputDescripcion = document.getElementById('descripcion');
    const inputFecha = document.getElementById('fecha');

    const imagenes = [
      'https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=900&q=80',
      'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=900&q=80',
      'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=900&q=80',
      'https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=900&q=80',
      'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80',
      'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=900&q=80'
    ];

    let imagenSeleccionada = imagenes[0];

    function renderBanco() {
      bancoImagenes.innerHTML = '';
      imagenes.forEach((url) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `relative w-[calc(50%-0.375rem)] overflow-hidden rounded-xl border sm:w-[calc(33.333%-0.5rem)] ${url === imagenSeleccionada ? 'border-gray-900' : 'border-gray-200'} transition`;
        button.innerHTML = `<img src="${url}" alt="Imagen de banco" class="h-24 w-full object-cover" />`;
        button.addEventListener('click', () => {
          imagenSeleccionada = url;
          previewImagen.src = url;
          renderBanco();
        });
        bancoImagenes.appendChild(button);
      });
    }

    function renderAgendadas() {
      const items = JSON.parse(localStorage.getItem('demo_scheduled_posts') || '[]');
      totalAgendadas.textContent = String(items.length);
      listaAgendadas.innerHTML = '';

      if (!items.length) {
        listaAgendadas.innerHTML = '<p class="rounded-lg bg-gray-50 px-3 py-2 text-sm text-gray-500">No hay publicaciones agendadas.</p>';
        return;
      }

      items
        .slice()
        .sort((a, b) => new Date(a.scheduleAt) - new Date(b.scheduleAt))
        .forEach((item) => {
          const card = document.createElement('article');
          card.className = 'rounded-xl border border-gray-200 p-3';
          card.innerHTML = `
            <p class="text-sm font-semibold text-gray-900">${item.title}</p>
            <p class="mt-1 text-xs text-gray-500">${new Date(item.scheduleAt).toLocaleString('es-ES')}</p>
          `;
          listaAgendadas.appendChild(card);
        });
    }

    function actualizarPreview() {
      previewTitulo.textContent = inputTitulo.value.trim() || 'Titulo de ejemplo';
      previewDescripcion.textContent = inputDescripcion.value.trim() || 'Aqui veras como quedaria el contenido antes de publicarlo.';
    }

    inputTitulo.addEventListener('input', actualizarPreview);
    inputDescripcion.addEventListener('input', actualizarPreview);

    formContenido.addEventListener('submit', (e) => {
      e.preventDefault();
      const title = inputTitulo.value.trim();
      const description = inputDescripcion.value.trim();
      const scheduleAt = inputFecha.value;

      if (!title || !description || !scheduleAt || !imagenSeleccionada) {
        estado.textContent = 'Completa todos los campos para agendar la publicacion.';
        estado.className = 'text-sm font-medium text-red-700';
        return;
      }

      const items = JSON.parse(localStorage.getItem('demo_scheduled_posts') || '[]');
      items.push({
        id: Date.now(),
        title,
        description,
        image: imagenSeleccionada,
        scheduleAt
      });

      localStorage.setItem('demo_scheduled_posts', JSON.stringify(items));
      estado.textContent = 'Contenido guardado y agendado correctamente.';
      estado.className = 'text-sm font-medium text-green-700';
      formContenido.reset();
      inputFecha.value = '';
      actualizarPreview();
      renderAgendadas();
    });

    renderBanco();
    renderAgendadas();
    actualizarPreview();
  </script>
</body>
</html>
