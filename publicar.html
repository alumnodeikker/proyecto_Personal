<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publicar | Despacho Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 text-gray-900 antialiased">
  <main class="mx-auto w-full max-w-4xl px-5 py-6 md:py-8">
    <header class="mb-6 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-gray-200 bg-white px-5 py-4 shadow-sm">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.14em] text-gray-500">Editor de contenido</p>
        <h1 class="text-2xl font-bold tracking-tight md:text-3xl">Crear publicacion</h1>
      </div>
      <a href="dashboard.html" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-100">Volver al dashboard</a>
    </header>

    <section class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm">
      <form id="formPublicar" class="space-y-4">
        <div>
          <label for="titulo" class="mb-1 block text-sm font-semibold text-gray-700">Titulo</label>
          <input id="titulo" type="text" required placeholder="Ej. Tips para organizar consultas en linea" class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-gray-500" />
        </div>

        <div>
          <label for="descripcion" class="mb-1 block text-sm font-semibold text-gray-700">Descripcion</label>
          <textarea id="descripcion" rows="4" required placeholder="Comparte una descripcion breve y clara para tu audiencia." class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-gray-500"></textarea>
        </div>

        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
          <div>
            <label for="tipo" class="mb-1 block text-sm font-semibold text-gray-700">Tipo de contenido</label>
            <select id="tipo" class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-gray-500">
              <option value="image">Foto</option>
              <option value="video">Video</option>
            </select>
          </div>
          <div>
            <label for="archivo" class="mb-1 block text-sm font-semibold text-gray-700">Archivo</label>
            <input id="archivo" type="file" required accept="image/*,video/*" class="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 file:mr-3 file:rounded-lg file:border-0 file:bg-gray-900 file:px-3 file:py-2 file:text-sm file:font-semibold file:text-white hover:file:bg-gray-700" />
          </div>
        </div>

        <div class="rounded-xl border border-gray-200 bg-gray-50 p-3">
          <p class="mb-2 text-sm font-semibold text-gray-800">Vista previa</p>
          <div id="previewWrap" class="flex h-56 items-center justify-center rounded-lg border border-gray-200 bg-white text-sm text-gray-500">
            Aun no has cargado un archivo
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <button type="submit" class="rounded-lg bg-gray-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-gray-700">Publicar en mi muro</button>
          <a href="dashboard.html" class="rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-100">Ir al muro</a>
        </div>
        <p id="estado" class="text-sm font-medium text-green-700"></p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('formPublicar');
    const tipo = document.getElementById('tipo');
    const archivo = document.getElementById('archivo');
    const previewWrap = document.getElementById('previewWrap');
    const estado = document.getElementById('estado');
    let mediaData = '';

    function mostrarPreview(file, tipoContenido) {
      const reader = new FileReader();
      reader.onload = (e) => {
        mediaData = e.target.result;
        previewWrap.innerHTML = '';
        const el = document.createElement(tipoContenido === 'video' ? 'video' : 'img');
        el.className = 'h-full w-full rounded-lg object-cover';
        el.src = mediaData;
        if (tipoContenido === 'video') {
          el.controls = true;
        }
        previewWrap.appendChild(el);
      };
      reader.readAsDataURL(file);
    }

    archivo.addEventListener('change', () => {
      const file = archivo.files[0];
      if (!file) return;
      const tipoContenido = tipo.value;
      const esVideo = file.type.startsWith('video/');
      const esImagen = file.type.startsWith('image/');

      if ((tipoContenido === 'video' && !esVideo) || (tipoContenido === 'image' && !esImagen)) {
        estado.textContent = 'El archivo no coincide con el tipo de contenido seleccionado.';
        estado.className = 'text-sm font-medium text-red-700';
        archivo.value = '';
        return;
      }

      estado.textContent = '';
      mostrarPreview(file, tipoContenido);
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const titulo = document.getElementById('titulo').value.trim();
      const descripcion = document.getElementById('descripcion').value.trim();
      const tipoContenido = tipo.value;

      if (!mediaData) {
        estado.textContent = 'Debes cargar una foto o video antes de publicar.';
        estado.className = 'text-sm font-medium text-red-700';
        return;
      }

      const posts = JSON.parse(localStorage.getItem('demo_posts') || '[]');
      posts.push({
        id: Date.now(),
        type: tipoContenido,
        title: titulo,
        description: descripcion,
        media: mediaData,
        dateText: new Date().toLocaleDateString('es-ES')
      });

      localStorage.setItem('demo_posts', JSON.stringify(posts));
      estado.textContent = 'Publicacion creada. Ya puedes verla en tu muro.';
      estado.className = 'text-sm font-medium text-green-700';
      form.reset();
      mediaData = '';
      previewWrap.textContent = 'Aun no has cargado un archivo';
      previewWrap.className = 'flex h-56 items-center justify-center rounded-lg border border-gray-200 bg-white text-sm text-gray-500';
    });
  </script>
</body>
</html>
